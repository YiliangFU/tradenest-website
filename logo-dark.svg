<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <!-- Top line - full width -->
  <rect x="0" y="0" width="360" height="8" fill="#2B1A6B"/>

  <!-- TradeNest text with letter spacing - dark color -->
  <text x="180" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="normal" fill="#2B1A6B" text-anchor="middle" letter-spacing="6">TradeNest</text>

  <!-- Red block background - full width -->
  <rect x="0" y="62" width="360" height="28" fill="#BE3528"/>

  <!-- SERVICE text with letter spacing -->
  <text x="180" y="82" font-family="Arial, sans-serif" font-size="17" font-weight="normal" fill="white" text-anchor="middle" letter-spacing="22">SERVICE</text>

  <!-- Bottom line - full width -->
  <rect x="0" y="94" width="360" height="6" fill="#2B1A6B"/>
</svg>
